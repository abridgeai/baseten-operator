{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "baseten-operator.labels" . | nindent 4 }}
  name: {{ include "baseten-operator.fullname" . }}-leader-election-rolebinding
  namespace: {{ include "baseten-operator.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "baseten-operator.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "baseten-operator.serviceAccountName" . }}
  namespace: {{ include "baseten-operator.namespace" . }}
{{- end -}}

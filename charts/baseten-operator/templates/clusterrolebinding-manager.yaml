{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    {{- include "baseten-operator.labels" . | nindent 4 }}
  name: {{ include "baseten-operator.fullname" . }}-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "baseten-operator.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "baseten-operator.serviceAccountName" . }}
  namespace: {{ include "baseten-operator.namespace" . }}
{{- end -}}

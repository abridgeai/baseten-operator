{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    {{- include "baseten-operator.labels" . | nindent 4 }}
  name: {{ include "baseten-operator.serviceAccountName" . }}
  namespace: {{ include "baseten-operator.namespace" . }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end -}}

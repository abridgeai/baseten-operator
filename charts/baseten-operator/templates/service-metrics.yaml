{{- if .Values.metrics.enabled -}}
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "baseten-operator.workloadLabels" . | nindent 4 }}
  name: {{ include "baseten-operator.fullname" . }}-controller-manager-metrics-service
  namespace: {{ include "baseten-operator.namespace" . }}
spec:
  ports:
  - name: https
    port: {{ .Values.metrics.port }}
    protocol: TCP
    targetPort: {{ .Values.metrics.port }}
  selector:
    {{- include "baseten-operator.selectorLabels" . | nindent 4 }}
{{- end -}}

apiVersion: models.baseten.com/v1alpha1
kind: BasetenModel
metadata:
  labels:
    app.kubernetes.io/name: baseten-operator
    app.kubernetes.io/managed-by: kustomize
  name: basetenmodel-sample
spec:
  # Reference to existing Baseten model
  modelName: "test-llama-3-8b"

  # Source deployment to promote (created by CI/CD via truss push)
  # This is the deployment that will be promoted to the target environment
  # Format: img-{container-img-version}-wgt-{model-weight-version}-p-{platform-config-version}
  sourceDeploymentName: "img-0.11.2.3-wgt-v2-p-1"

  # Target environment configuration (required)
  environment:
    name: "development"

    # Optional: Autoscaling configuration
    # autoscaling:
    #   minReplicas: 1
    #   maxReplicas: 10
    #   concurrencyTarget: 20
    #   scaleDownDelay: 120
    #   autoscalingWindow: 600
    #   targetUtilizationPercentage: 70

    # Optional: Promotion settings
    # promotionSettings:
    #   scaleDownPreviousDeployment: true
    #   preserveInstanceType: true
    #   rampUpWhilePromoting: true
    #   rampUpDurationSeconds: 600
    #   redeployOnPromotion: false
    #   rollingDeploy: true
    #   rollingDeployConfig:
    #     strategy: "REPLICA"
    #     maxSurgePercent: 20
    #     maxUnavailablePercent: 20
    #     stabilizationTimeSeconds: 300
    #     promotionCleanupStrategy: "SCALE_TO_ZERO"

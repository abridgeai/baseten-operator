# This rule is not used by the project baseten-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over models.baseten.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: baseten-operator
    app.kubernetes.io/managed-by: kustomize
  name: basetenmodel-admin-role
rules:
- apiGroups:
  - models.baseten.com
  resources:
  - basetenmodels
  verbs:
  - '*'
- apiGroups:
  - models.baseten.com
  resources:
  - basetenmodels/status
  verbs:
  - get

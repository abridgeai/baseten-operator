# This rule is not used by the project baseten-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the models.baseten.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: baseten-operator
    app.kubernetes.io/managed-by: kustomize
  name: basetenmodel-editor-role
rules:
- apiGroups:
  - models.baseten.com
  resources:
  - basetenmodels
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - models.baseten.com
  resources:
  - basetenmodels/status
  verbs:
  - get

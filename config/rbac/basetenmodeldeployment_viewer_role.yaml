# This rule is not used by the project baseten-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to models.baseten.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: baseten-operator
    app.kubernetes.io/managed-by: kustomize
  name: basetenmodeldeployment-viewer-role
rules:
- apiGroups:
  - models.baseten.com
  resources:
  - basetenmodeldeployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - models.baseten.com
  resources:
  - basetenmodeldeployments/status
  verbs:
  - get

apiVersion: models.baseten.com/v1alpha1
kind: BasetenModel
metadata:
  name: example-model-dev
  namespace: default
spec:
  modelName: "my-llm-model"

  # Latest deployment name created at build time.
  sourceDeploymentName: "img-1.0-wgt-1.0-p-1.3"

  # Environment in Baseten
  environment:
    name: "dev"

    autoscaling:
      minReplicas: 0
      maxReplicas: 5
      concurrencyTarget: 10

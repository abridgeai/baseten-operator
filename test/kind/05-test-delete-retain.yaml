apiVersion: models.baseten.com/v1alpha1
kind: BasetenModel
metadata:
  name: example-delete-retain
  namespace: default
spec:
  modelName: "my-llm-model"

  sourceDeploymentName: "img-1.0-wgt-1.0-p-1.3"

  # Retain (default): kubectl delete bm leaves the upstream Baseten model alone.
  # The CR vanishes; deployments, environments, and promotion history in Baseten
  # are untouched.
  deletionPolicy: Retain

  environment:
    name: "dev"

    autoscaling:
      minReplicas: 0
      maxReplicas: 5
      concurrencyTarget: 10

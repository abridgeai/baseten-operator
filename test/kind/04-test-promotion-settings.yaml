apiVersion: models.baseten.com/v1alpha1
kind: BasetenModel
metadata:
  name: example-model-promo-settings
  namespace: default
spec:
  modelName: "my-llm-model"

  # Use existing deployment
  sourceDeploymentName: "img-1.0-wgt-1.0-p-1.3"

  environment:
    name: "dev"

    autoscaling:
      minReplicas: 0
      maxReplicas: 5
      concurrencyTarget: 10

    # Promotion settings to test drift detection
    promotionSettings:
      promotionCleanupStrategy: "SCALE_TO_ZERO"
      rampUpWhilePromoting: true
      rampUpDurationSeconds: 300
      scaleDownPreviousDeployment: true   # promote-time only
      preserveInstanceType: true          # promote-time only

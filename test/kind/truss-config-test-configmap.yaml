apiVersion: v1
kind: ConfigMap
metadata:
  name: example-model-setup
  namespace: default
data:
  setup.sh: |
    #!/bin/bash
    unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY
    export NO_PROXY="*"

    # Install dependencies
    apt-get update && apt-get install -y curl

    # Setup directories
    CACHE_DIR="/cache/org"
    MODEL_DIR="$CACHE_DIR/my-model"
    MODEL_PATH="$MODEL_DIR/model"
    mkdir -p "$MODEL_PATH"

    # Download model weights (customize for your storage backend)
    # Example: gsutil, aws s3 cp, wget, etc.
    echo "Downloading model weights..."
    # gsutil -m cp -r "gs://my-bucket/models/my-model/*" "$MODEL_PATH/"

    # Start vLLM server
    vllm serve $MODEL_PATH \
      --served-model-name my-model \
      --host 0.0.0.0 \
      --disable-log-requests \
      --port 8000 \
      --max-model-len 8192 \
      --enable-prefix-caching \
      --max-num-seqs 128

apiVersion: models.baseten.com/v1alpha1
kind: BasetenModel
metadata:
  name: example-model-production
  namespace: default
spec:
  # Same model as dev, testing promotion to production
  modelName: "my-llm-model"

  # Same deployment as dev, testing environment promotion
  sourceDeploymentName: "img-1.0-wgt-1.0-p-1.3"

  # Different environment - will promote same deployment to production
  environment:
    name: "production"

    # Optional: customize autoscaling for production
    autoscaling:
      minReplicas: 0
      maxReplicas: 5
      concurrencyTarget: 10

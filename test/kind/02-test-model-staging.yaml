apiVersion: models.baseten.com/v1alpha1
kind: BasetenModel
metadata:
  name: example-model-staging
  namespace: default
spec:
  # Same model as dev, testing promotion to staging
  modelName: "my-llm-model"

  # Same deployment as dev, testing environment promotion
  sourceDeploymentName: "img-1.0-wgt-1.0-p-1.3"

  # Different environment - will promote same deployment to staging
  environment:
    name: "staging"

    # Optional: customize autoscaling for staging
    autoscaling:
      minReplicas: 0
      maxReplicas: 2
      concurrencyTarget: 3

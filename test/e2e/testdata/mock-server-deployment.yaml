apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-baseten-api
  namespace: baseten-operator-system
  labels:
    app: mock-baseten-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-baseten-api
  template:
    metadata:
      labels:
        app: mock-baseten-api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mock-server
        image: mock-baseten-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          runAsUser: 65532
          capabilities:
            drop:
            - "ALL"
        readinessProbe:
          httpGet:
            path: /v1/models
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mock-baseten-api
  namespace: baseten-operator-system
spec:
  selector:
    app: mock-baseten-api
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
